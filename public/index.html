<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnisci Core Engine</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background-color: #1e293b; padding: 2rem; border-radius: 12px; width: 100%; max-width: 500px; text-align: center; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid #475569; border-radius: 6px; background-color: #0f172a; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #2563eb; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        #image-result-display { margin-top: 1.5rem; min-height: 150px; display: flex; justify-content: center; align-items: center; border: 2px dashed #475569; border-radius: 8px; background-color: #0f172a; padding: 10px; }
        #image-result-display img { max-width: 100%; height: auto; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: #38bdf8;">Omnisci Graphics Studio</h2>
        <input type="text" id="prompt-input" placeholder="Describe your infographic design...">
        <button id="generate-btn">Generate Graphic Layout</button>
        <div id="image-result-display">
            <p>No graphic generated yet.</p>
        </div>
    </div>
    <script>
        document.getElementById('generate-btn').addEventListener('click', async () => {
            const userPrompt = document.getElementById('prompt-input').value.trim();
            const displayContainer = document.getElementById('image-result-display');
            if (!userPrompt) return alert("Please type a layout concept first!");
            
            const optimizedPrompt = userPrompt + ", clean infographic design, professional vector style, compliance layout, legal limits";
            displayContainer.innerHTML = "<p>🎨 Synthesizing legal infographics layout canvas...</p>";
            
            try {
                const imgElement = await puter.ai.txt2img(optimizedPrompt, { model: "gpt-image-2", quality: "high" });
                displayContainer.innerHTML = '';
                displayContainer.appendChild(imgElement);
            } catch (error) {
                try {
                    displayContainer.innerHTML = "<p>🔄 Routing to backup Flux matrix...</p>";
                    const fallbackImg = await puter.ai.txt2img(optimizedPrompt, { model: "black-forest-labs/flux-schnell" });
                    displayContainer.innerHTML = '';
                    displayContainer.appendChild(fallbackImg);
                } catch (fErr) {
                    displayContainer.innerHTML = "<p style='color:#ef4444;'>⚠️ Generation array busy.</p>";
                }
            }
        });
    </script>
</body>
</html>
